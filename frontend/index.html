<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Task Manager</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://unpkg.com/vue@3"></script>

  <style>
    body {
      background: url("https://images.unsplash.com/photo-1557682250-33bd709cbe85") center/cover;
      min-height: 100vh;
    }

    #app {
      background: rgba(255,255,255,0.95);
      padding: 25px;
      border-radius: 18px;
      margin-top: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .task-card {
      border: none;
      border-radius: 14px;
      transition: 0.2s;
    }

    .task-card:hover {
      transform: scale(1.02);
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    .lang-btn {
      position: absolute;
      top: 15px;
      right: 15px;
    }
  </style>
</head>

<body>

<div id="app" class="container">

  <!-- LANGUAGE -->
  <div class="lang-btn">
    <button class="btn btn-sm btn-primary me-1" @click="lang='ua'">UA</button>
    <button class="btn btn-sm btn-dark" @click="lang='en'">EN</button>
  </div>

  <!-- TITLE -->
  <h2 class="text-center mb-4 fw-bold text-primary">
    {{ t.title }}
  </h2>

  <!-- INPUT -->
  <div class="input-group mb-3">
    <input v-model="newTask" class="form-control" :placeholder="t.placeholder">
    <button @click="addTask" class="btn btn-success">
      <i class="fas fa-plus"></i>
    </button>
  </div>

  <!-- FILTERS -->
  <div class="mb-3 text-center">
    <button class="btn btn-outline-primary btn-sm me-1" @click="filter='all'">{{ t.all }}</button>
    <button class="btn btn-outline-success btn-sm me-1" @click="filter='active'">{{ t.active }}</button>
    <button class="btn btn-outline-secondary btn-sm" @click="filter='done'">{{ t.done }}</button>
  </div>

  <!-- TASKS -->
  <div v-for="task in filteredTasks" :key="task.id" class="card task-card p-3 mb-3">

    <div v-if="editingTask && editingTask.id === task.id">
      <input v-model="editText" class="form-control mb-2">
      <button @click="saveEdit(task)" class="btn btn-success btn-sm">Save</button>
    </div>

    <div v-else class="d-flex justify-content-between align-items-center">

      <h5 :class="{done: task.completed === 1}">
        {{ task.title }}
      </h5>

      <div>
        <button @click="toggleTask(task)" class="btn btn-outline-success btn-sm me-2">
          ✔
        </button>

        <button @click="editTask(task)" class="btn btn-outline-primary btn-sm me-2">
          ✏
        </button>

        <button @click="deleteTask(task.id)" class="btn btn-outline-danger btn-sm">
          🗑
        </button>
      </div>

    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
